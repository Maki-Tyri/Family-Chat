<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Messenger UI Upgrade</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
* {
  box-sizing:border-box;
}

body {
  margin:0;
  font-family: system-ui, Arial;
  background:#0b141a;
  color:white;
  height:100vh;
  overflow:hidden;
}

/* APP WRAPPER */
#app {
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* LOGIN */
#login {
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input, button, textarea {
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button {
  background:#00a884;
  color:white;
  font-weight:600;
}

/* CHAT SCREEN */
#chat {
  display:none;
  flex-direction:column;
  height:100vh;
}

/* HEADER (Messenger style) */
#header {
  padding:14px;
  background:#202c33;
  font-weight:600;
  font-size:16px;
  position:sticky;
  top:0;
  z-index:10;
}

/* CHAT BOX */
#chatBox {
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background:#0b141a;
}

/* MESSAGE BUBBLES */
.msg {
  max-width:75%;
  padding:10px 12px;
  border-radius:18px;
  font-size:15px;
  line-height:1.3;
  word-break:break-word;
}

.me {
  align-self:flex-end;
  background:#005c4b;
  border-bottom-right-radius:6px;
}

.other {
  align-self:flex-start;
  background:#202c33;
  border-bottom-left-radius:6px;
}

/* NAME */
.small {
  font-size:11px;
  opacity:0.7;
  margin-top:4px;
}

/* INPUT BAR (fixed like Messenger) */
#inputBar {
  display:flex;
  gap:8px;
  padding:10px;
  background:#202c33;
  padding-bottom:calc(10px + env(safe-area-inset-bottom));
}

#msg {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
  font-size:15px;
}

#send {
  padding:12px 16px;
  border-radius:20px;
  border:none;
  background:#00a884;
  color:white;
  font-weight:600;
}

/* MOBILE FIX */
@media (max-width:600px){
  .msg { max-width:85%; }
}
</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->
<div id="login">
  <h2 style="margin:10px 0;">Messenger</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="regBtn" style="background:#2563eb;">Register</button>
</div>

<!-- CHAT -->
<div id="chat">

  <div id="header">Messenger</div>

  <div id="chatBox"></div>

  <div id="inputBar">
    <input id="msg" placeholder="Message...">
    <button id="send">Send</button>
  </div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let ref = null;

const login = document.getElementById("login");
const chat = document.getElementById("chat");
const chatBox = document.getElementById("chatBox");

function showChat(){
  login.style.display="none";
  chat.style.display="flex";
}

function showLogin(){
  login.style.display="flex";
  chat.style.display="none";
}

/* AUTH */
auth.onAuthStateChanged(u=>{
  if(!u){
    user = null;
    showLogin();
    return;
  }

  user = u;
  showChat();

  listen();
});

/* LISTEN */
function listen(){
  if(ref) ref.off();

  chatBox.innerHTML = "";

  ref = db.ref("messages/global");

  ref.on("child_added", snap=>{
    const m = snap.val();

    const div = document.createElement("div");
    div.className = "msg " + (m.sender === user.uid ? "me":"other");

    div.innerHTML = `
      <div>${m.text}</div>
      <div class="small">${m.name}</div>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* SEND */
document.getElementById("send").onclick = ()=>{
  const text = document.getElementById("msg").value.trim();
  if(!text) return;

  db.ref("messages/global").push({
    text,
    sender: user.uid,
    name: user.email.split("@")[0],
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

/* LOGIN */
document.getElementById("loginBtn").onclick = ()=>{
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value.trim(),
    document.getElementById("pass").value.trim()
  ).catch(e=>{
    alert(e.message);
  });
};

/* REGISTER */
document.getElementById("regBtn").onclick = ()=>{
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value.trim(),
    document.getElementById("pass").value.trim()
  ).catch(e=>{
    alert(e.message);
  });
};

</script>

</body>
</html>
