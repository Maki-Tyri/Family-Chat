<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Working Messenger</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#app { max-width:500px; margin:auto; height:100vh; display:flex; flex-direction:column; }

section { display:none; padding:10px; flex-direction:column; flex:1; }
section.active { display:flex; }

input, button, textarea, select {
  padding:10px; margin:5px 0; width:100%; border:none; border-radius:6px;
}

#chatBox {
  flex:1;
  overflow:auto;
  background:#111827;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg {
  padding:8px;
  border-radius:6px;
  max-width:80%;
}

.me { background:#2563eb; align-self:flex-end; }
.other { background:#374151; align-self:flex-start; }

small { opacity:0.7; font-size:11px; }
button { background:#2563eb; color:white; cursor:pointer; }
</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->
<section id="login" class="active">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="regBtn">Register</button>
</section>

<!-- CHAT -->
<section id="chat">
  <input id="name" placeholder="Display name">

  <select id="chatSelect">
    <option value="global">Global Chat</option>
  </select>

  <div id="chatBox"></div>

  <textarea id="msg"></textarea>
  <button id="send">Send</button>
</section>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let currentChat = "global";
let ref = null;

// UI
const login = document.getElementById("login");
const chat = document.getElementById("chat");
const chatBox = document.getElementById("chatBox");

// SHOW
function show(x){
  login.classList.remove("active");
  chat.classList.remove("active");
  x.classList.add("active");
}

// AUTH
auth.onAuthStateChanged(u=>{
  if(!u){
    user = null;
    show(login);
    return;
  }

  user = u;
  show(chat);

  document.getElementById("name").value =
    u.email ? u.email.split("@")[0] : "user";

  listen();
});

// LISTEN MESSAGES
function listen(){
  if(ref) ref.off();

  chatBox.innerHTML = "";

  ref = db.ref("messages/"+currentChat);

  ref.on("child_added", s=>{
    const m = s.val();

    const div = document.createElement("div");
    div.className = "msg " + (m.sender === user.uid ? "me":"other");

    div.innerHTML = `
      ${m.text}
      <br><small>${m.name}</small>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// SEND
document.getElementById("send").onclick = ()=>{
  const text = document.getElementById("msg").value.trim();
  if(!text) return;

  db.ref("messages/"+currentChat).push({
    text,
    sender: user.uid,
    name: document.getElementById("name").value,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

// LOGIN
document.getElementById("loginBtn").onclick = ()=>{
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("pass").value
  ).catch(e=>alert(e.message));
};

// REGISTER
document.getElementById("regBtn").onclick = ()=>{
  auth.createUserWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("pass").value
  ).catch(e=>alert(e.message));
};

</script>

</body>
</html>
