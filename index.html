<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Firebase Messenger with Emoji Avatars</title>

  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    html, body { margin:0; padding:0; font-family: Arial; background:#f5f5f5; height:100%; }
    #app { max-width:600px; margin:auto; background:#fff; height:100vh; display:flex; flex-direction:column; }

    header { padding:1rem; border-bottom:1px solid #ccc; display:flex; justify-content:space-between; background:#eee; }

    section { flex:1; padding:1rem; display:none; flex-direction:column; }
    section.active { display:flex; }

    input, select, button, textarea {
      padding:0.5rem; margin-bottom:0.7rem; border:1px solid #ccc; border-radius:4px;
    }

    button { background:#007bff; color:#fff; border:none; cursor:pointer; }
    button:hover { background:#0056b3; }

    #messages {
      flex:1; overflow-y:auto; border:1px solid #ccc; padding:0.5rem;
      background:#fafafa; display:flex; flex-direction:column; gap:0.5rem;
    }

    .message {
      display:flex; gap:0.5rem; max-width:80%;
      padding:0.5rem; border-radius:6px; background:#e1ffc7;
    }

    .message.self { background:#c7dfff; align-self:flex-end; flex-direction:row-reverse; }

    .avatar { width:36px; height:36px; font-size:28px; text-align:center; }

    .sender-info { font-size:0.85rem; }
    .sender { font-weight:bold; }
    .timestamp { font-size:0.7rem; color:#666; }

    footer {
      position:fixed; bottom:0; width:100%;
      text-align:center; font-size:0.85rem;
      background:rgba(255,255,255,0.4);
    }
  </style>
</head>

<body>
<div id="app">
  <header>
    <div>Firebase Messenger</div>
    <button id="logoutBtn" style="display:none;">Logout</button>
  </header>

  <section id="login" class="active">
    <input type="email" id="loginEmail" placeholder="Email" />
    <input type="password" id="loginPassword" placeholder="Password" />
    <button id="loginBtn">Login</button>
    <button id="toRegisterBtn">Register Instead</button>
  </section>

  <section id="register">
    <input type="email" id="registerEmail" />
    <input type="password" id="registerPassword" />
    <button id="registerBtn">Register</button>
    <button id="toLoginBtn">Back</button>
  </section>

  <section id="chat">
    <input id="displayNameInput" placeholder="Display name" />
    <button id="saveProfileBtn">Save</button>

    <select id="chatSelect">
      <option value="" disabled selected>Select chat</option>
      <optgroup label="Users" id="userOptions"></optgroup>
      <optgroup label="Groups" id="groupOptions"></optgroup>
    </select>

    <div id="messages"></div>
    <div id="typingIndicator"></div>

    <div style="display:flex; gap:0.5rem;">
      <textarea id="messageInput"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </section>
</div>

<footer>&copy; 2025 Maki Web</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331",
  storageBucket: "project-955237504610034331.appspot.com",
  messagingSenderId: "76212939677",
  appId: "1:76212939677:web:ef498bc1e4e480ab6e5d74"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

const emojiAvatars = ["😀","😎","🤖","🐱","🐶","🦊","🐼","🐸"];

const getAvatar = id => {
  let sum = 0;
  for (let c of id) sum += c.charCodeAt(0);
  return emojiAvatars[sum % emojiAvatars.length];
};

let currentUser = null;
let selectedChatId = null;
let messagesRef = null;
let typingTimeout;

const loginSection = document.getElementById("login");
const registerSection = document.getElementById("register");
const chatSection = document.getElementById("chat");

const chatSelect = document.getElementById("chatSelect");
const userOptions = document.getElementById("userOptions");
const groupOptions = document.getElementById("groupOptions");

const messagesDiv = document.getElementById("messages");
const messageInput = document.getElementById("messageInput");
const typingIndicator = document.getElementById("typingIndicator");

function show(sec){
  loginSection.classList.remove("active");
  registerSection.classList.remove("active");
  chatSection.classList.remove("active");
  sec.classList.add("active");
}

auth.onAuthStateChanged(user => {
  if (!user) {
    currentUser = null;
    show(loginSection);
    return;
  }

  currentUser = user;
  show(chatSection);

  loadProfile();
  joinGroup();
  populateChats();
});

function loadProfile(){
  db.ref("users/"+currentUser.uid).once("value").then(snap=>{
    const d = snap.val();
    if (d) document.getElementById("displayNameInput").value = d.displayName || "";
  });
}

function joinGroup(){
  db.ref("groups/group_everyone/members/"+currentUser.uid).set(true);
}

async function populateChats(){
  userOptions.innerHTML = "";
  groupOptions.innerHTML = "";

  const snap = await db.ref("users").once("value");
  const users = snap.val() || {};

  for (let uid in users){
    if (uid === currentUser.uid) continue;

    const opt = document.createElement("option");
    opt.value = [uid, currentUser.uid].sort().join("_");
    opt.textContent = users[uid].displayName || users[uid].email;
    userOptions.appendChild(opt);
  }

  const group = document.createElement("option");
  group.value = "group_everyone";
  group.textContent = "Everyone";
  groupOptions.appendChild(group);

  // 🔥 FIX: AUTO SELECT FIRST CHAT
  setTimeout(() => {
    const first = chatSelect.querySelector("option:not([disabled])");
    if (first) {
      chatSelect.value = first.value;
      chatSelect.dispatchEvent(new Event("change"));
    }
  }, 300);
}

function listen(chatId){
  if (!chatId) return;

  if (messagesRef) messagesRef.off();

  selectedChatId = chatId;
  messagesDiv.innerHTML = "";

  messagesRef = db.ref("messages/"+chatId);

  messagesRef.on("child_added", snap=>{
    const m = snap.val();

    const div = document.createElement("div");
    div.className = "message" + (m.sender === currentUser.uid ? " self" : "");

    div.innerHTML = `
      <div class="avatar">${getAvatar(m.sender)}</div>
      <div>
        <div><b>${m.senderName}</b></div>
        <div>${m.text}</div>
        <div class="timestamp">${new Date(m.timestamp).toLocaleTimeString()}</div>
      </div>
    `;

    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });
}

chatSelect.onchange = e => {
  listen(e.target.value);
};

document.getElementById("sendBtn").onclick = () => {
  const text = messageInput.value.trim();
  if (!text || !selectedChatId) return;

  db.ref("messages/"+selectedChatId).push({
    text,
    sender: currentUser.uid,
    senderName: document.getElementById("displayNameInput").value || currentUser.email,
    timestamp: Date.now()
  });

  messageInput.value = "";
};
</script>
</body>
</html>
