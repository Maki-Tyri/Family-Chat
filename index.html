<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Firebase Messenger FIXED LOGIN</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

#app { max-width:500px; margin:auto; height:100vh; display:flex; flex-direction:column; }

section { display:none; flex-direction:column; padding:10px; flex:1; }
section.active { display:flex; }

input, button, textarea {
  padding:10px; margin:5px 0; border:none; border-radius:6px;
  width:100%;
}

#chatBox {
  flex:1;
  overflow:auto;
  background:#111827;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.msg {
  padding:8px;
  border-radius:6px;
  max-width:80%;
}

.me { background:#2563eb; align-self:flex-end; }
.other { background:#374151; align-self:flex-start; }

button { background:#2563eb; color:white; cursor:pointer; }
</style>
</head>

<body>

<div id="app">

<!-- LOGIN -->
<section id="login" class="active">
  <h3>Login</h3>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="regBtn">Register</button>
</section>

<!-- CHAT -->
<section id="chat">
  <h3>Messenger</h3>

  <input id="name" placeholder="Display name">

  <div id="chatBox"></div>

  <textarea id="msg"></textarea>
  <button id="send">Send</button>
</section>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let ref = null;

const login = document.getElementById("login");
const chat = document.getElementById("chat");
const chatBox = document.getElementById("chatBox");

function show(x){
  login.classList.remove("active");
  chat.classList.remove("active");
  x.classList.add("active");
}

// 🔥 AUTH STATE
auth.onAuthStateChanged(u=>{
  if(!u){
    user = null;
    show(login);
    return;
  }

  user = u;
  show(chat);

  document.getElementById("name").value =
    u.email ? u.email.split("@")[0] : "user";

  listenMessages();
});

// 🔥 LISTEN
function listenMessages(){
  if(ref) ref.off();

  chatBox.innerHTML = "";

  ref = db.ref("messages/global");

  ref.on("child_added", snap=>{
    const m = snap.val();

    const div = document.createElement("div");
    div.className = "msg " + (m.sender === user.uid ? "me":"other");

    div.textContent = `${m.name}: ${m.text}`;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// 🔥 SEND
document.getElementById("send").onclick = ()=>{
  const text = document.getElementById("msg").value.trim();
  if(!text) return;

  db.ref("messages/global").push({
    text,
    sender: user.uid,
    name: document.getElementById("name").value || "user",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

// 🔥 LOGIN (WITH FULL ERROR DEBUG)
document.getElementById("loginBtn").onclick = ()=>{
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email, pass)
  .catch(e=>{
    alert("LOGIN ERROR:\n" + e.code + "\n" + e.message);
    console.log(e);
  });
};

// 🔥 REGISTER (WITH DEBUG)
document.getElementById("regBtn").onclick = ()=>{
  const email = document.getElementById("email").value;
  const pass = document.getElementById("pass").value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(res=>{
    alert("Account created!");
    db.ref("users/"+res.user.uid).set({
      email: res.user.email,
      name: res.user.email.split("@")[0]
    });
  })
  .catch(e=>{
    alert("REGISTER ERROR:\n" + e.code + "\n" + e.message);
    console.log(e);
  });
};

</script>

</body>
</html>
