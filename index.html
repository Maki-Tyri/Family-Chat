<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin:0;
  font-family: system-ui, -apple-system, Arial;
  background:#0b141a;
  color:white;
}

/* APP CONTAINER */
#app {
  height:100vh;
  display:flex;
  flex-direction:column;
  max-width:520px;
  margin:auto;
  background:#111b21;
}

/* HEADER */
header {
  padding:14px;
  background:#202c33;
  font-weight:600;
  text-align:center;
  font-size:16px;
}

/* SCREENS */
section {
  display:none;
  flex:1;
  flex-direction:column;
  padding:14px;
}
section.active {
  display:flex;
}

/* INPUTS */
input, textarea, select {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1f2c33;
  color:white;
  font-size:14px;
}

textarea {
  resize:none;
  min-height:50px;
}

/* BUTTONS */
button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#00a884;
  color:white;
  font-weight:600;
  font-size:14px;
}

/* CHAT BOX */
#chatBox {
  flex:1;
  overflow-y:auto;
  padding:10px 4px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background:#0b141a;
  border-radius:12px;
}

/* MESSAGE BUBBLES */
.msg {
  max-width:75%;
  padding:10px 12px;
  border-radius:14px;
  font-size:14px;
  line-height:1.3;
  word-wrap:break-word;
}

.me {
  background:#005c4b;
  align-self:flex-end;
  border-bottom-right-radius:4px;
}

.other {
  background:#202c33;
  align-self:flex-start;
  border-bottom-left-radius:4px;
}

/* INPUT AREA FIXED STYLE */
#inputArea {
  display:flex;
  gap:8px;
  padding:10px 0 0;
}

#msg {
  flex:1;
}

/* SEND BUTTON SMALL */
#send {
  width:90px;
}

/* SMALL TEXT */
small {
  opacity:0.6;
  font-size:11px;
  display:block;
  margin-top:4px;
}
</style>
</head>

<body>

<div id="app">

<header>💬 Messenger</header>

<!-- LOGIN -->
<section id="login" class="active">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="regBtn">Register</button>
</section>

<!-- CHAT -->
<section id="chat">

  <input id="name" placeholder="Display name" readonly>

  <select id="chatSelect">
    <option value="global">🌍 Family Chat</option>
  </select>

  <div id="chatBox"></div>

  <div id="inputArea">
    <textarea id="msg" placeholder="Message..."></textarea>
    <button id="send">Send</button>
  </div>

</section>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331"
};

/* 🔥 THIS WAS MISSING (CRITICAL FIX) */
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let ref = null;

const login = document.getElementById("login");
const chat = document.getElementById("chat");
const chatBox = document.getElementById("chatBox");

function show(x){
  login.classList.remove("active");
  chat.classList.remove("active");
  x.classList.add("active");
}

/* AUTH */
auth.onAuthStateChanged(u=>{
  if(!u){
    user = null;
    show(login);
    return;
  }

  user = u;
  show(chat);

  const emailName = (u.email || "").split("@")[0];

document.getElementById("name").value =
  emailName || "user";

  listen();
});

/* LISTEN */
function listen(){
  if(ref) ref.off();

  chatBox.innerHTML = "";

  ref = db.ref("messages/global");

  ref.on("child_added", snap=>{
    const m = snap.val();
    if(!m || !user) return;

    const div = document.createElement("div");
    div.className = "msg " + (m.sender === user.uid ? "me":"other");

    div.innerHTML = `
      ${m.text || ""}
      <small>${m.name || "user"}</small>
    `;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

/* SEND */
document.getElementById("send").onclick = ()=>{
  const text = document.getElementById("msg").value.trim();
  const name = document.getElementById("name").value.trim();

  if(!text || !user) return;

  db.ref("messages/global").push({
    text,
    sender: user.uid,
    name: (document.getElementById("name").value || "").trim() || emailName,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

/* LOGIN */
document.getElementById("loginBtn").onclick = ()=>{
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value.trim();

  auth.signInWithEmailAndPassword(email, pass)
  .catch(e=>alert(e.code + "\n" + e.message));
};

/* REGISTER */
document.getElementById("regBtn").onclick = ()=>{
  const email = document.getElementById("email").value.trim();
  const pass = document.getElementById("pass").value.trim();

  auth.createUserWithEmailAndPassword(email, pass)
  .catch(e=>alert(e.code + "\n" + e.message));
};

</script>

</body>
</html>
