<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FB Messenger UI Clone</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family: system-ui;
  background:#0b141a;
  color:white;
  height:100vh;
}

/* APP */
#app {
  height:100vh;
  display:flex;
}

/* SIDEBAR (chat list) */
#sidebar {
  width:320px;
  background:#111b21;
  border-right:1px solid #22303c;
  display:flex;
  flex-direction:column;
}

#meBar {
  padding:14px;
  background:#202c33;
  font-weight:600;
}

.user {
  padding:12px;
  cursor:pointer;
  border-bottom:1px solid #1f2a33;
}

.user:hover {
  background:#1f2a33;
}

/* CHAT AREA */
#chatArea {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* HEADER */
#header {
  padding:14px;
  background:#202c33;
  font-weight:600;
}

/* CHAT BOX */
#chatBox {
  flex:1;
  overflow-y:auto;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:8px;
  background:#0b141a;
}

/* MESSAGES */
.msg {
  max-width:70%;
  padding:10px 12px;
  border-radius:18px;
  font-size:14px;
  word-break:break-word;
}

.me {
  align-self:flex-end;
  background:#005c4b;
  border-bottom-right-radius:6px;
}

.other {
  align-self:flex-start;
  background:#202c33;
  border-bottom-left-radius:6px;
}

.small {
  font-size:11px;
  opacity:0.7;
  margin-top:4px;
}

/* INPUT */
#inputBar {
  display:flex;
  padding:10px;
  background:#202c33;
  gap:8px;
}

#msg {
  flex:1;
  padding:12px;
  border-radius:20px;
  border:none;
  outline:none;
}

button {
  background:#00a884;
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:20px;
  cursor:pointer;
}

/* MOBILE MODE */
@media (max-width:700px){
  #app { flex-direction:column; }

  #sidebar {
    width:100%;
    height:160px;
    overflow-x:auto;
    flex-direction:row;
    white-space:nowrap;
  }

  .user {
    display:inline-block;
    min-width:160px;
  }
}
</style>
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="meBar">Messenger</div>
  <div id="users"></div>
</div>

<!-- CHAT -->
<div id="chatArea">

  <div id="header">Select chat</div>

  <div id="chatBox"></div>

  <div id="inputBar">
    <input id="msg" placeholder="Message...">
    <button id="send">Send</button>
  </div>

</div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let me = null;
let currentChat = null;
let chatRef = null;
let users = {};

// LOGIN AUTO (simple demo)
auth.signInAnonymously().then(res=>{
  me = res.user;

  db.ref("users/"+me.uid).set({
    name:"User-"+me.uid.slice(0,5)
  });

  loadUsers();
});

/* LOAD USERS */
async function loadUsers(){
  const snap = await db.ref("users").once("value");
  users = snap.val() || {};

  const box = document.getElementById("users");
  box.innerHTML = "";

  for(let id in users){
    if(id === me.uid) continue;

    const div = document.createElement("div");
    div.className = "user";
    div.textContent = users[id].name;

    div.onclick = ()=>openChat(id);

    box.appendChild(div);
  }
}

/* CHAT ID */
function chatId(a,b){
  return [a,b].sort().join("_");
}

/* OPEN CHAT */
function openChat(other){
  currentChat = chatId(me.uid, other);

  document.getElementById("header").innerText =
    users[other].name;

  if(chatRef) chatRef.off();

  const box = document.getElementById("chatBox");
  box.innerHTML = "";

  chatRef = db.ref("messages/"+currentChat);

  chatRef.on("child_added", s=>{
    const m = s.val();

    const div = document.createElement("div");
    div.className = "msg " + (m.sender === me.uid ? "me":"other");

    div.innerHTML = `
      <div>${m.text}</div>
      <div class="small">${m.name}</div>
    `;

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });
}

/* SEND */
document.getElementById("send").onclick = ()=>{
  const text = document.getElementById("msg").value.trim();
  if(!text || !currentChat) return;

  db.ref("messages/"+currentChat).push({
    text,
    sender: me.uid,
    name: users[me.uid]?.name || "me",
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

</script>

</body>
</html>
