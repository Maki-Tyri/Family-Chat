<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Firebase Chat FIXED</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
#app { max-width:600px; margin:auto; height:100vh; display:flex; flex-direction:column; background:#fff; }

header { padding:10px; background:#eee; display:flex; justify-content:space-between; }

section { flex:1; display:none; flex-direction:column; padding:10px; }
section.active { display:flex; }

input, select, textarea, button {
  padding:8px; margin:5px 0; width:100%; box-sizing:border-box;
}

#messages {
  flex:1; overflow:auto; border:1px solid #ccc; padding:10px;
  display:flex; flex-direction:column; gap:6px;
  background:#fafafa;
}

.msg {
  padding:6px; border-radius:6px;
  background:#e6ffe6;
  max-width:80%;
}

.msg.me { background:#d6e4ff; align-self:flex-end; }

footer {
  text-align:center;
  font-size:12px;
  padding:6px;
  background:#fff;
}
</style>
</head>

<body>
<div id="app">

<header>
  <div>Chat FIXED</div>
  <button id="logoutBtn" style="display:none;">Logout</button>
</header>

<section id="login" class="active">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
  <button id="goReg">Register</button>
</section>

<section id="register">
  <input id="remail" placeholder="Email">
  <input id="rpass" type="password" placeholder="Password">
  <button id="regBtn">Create</button>
  <button id="goLogin">Back</button>
</section>

<section id="chat">
  <input id="name" placeholder="Display name">

  <select id="chatSelect">
    <option disabled selected value="">Select chat</option>
    <optgroup label="Users" id="users"></optgroup>
    <optgroup label="Groups" id="groups"></optgroup>
  </select>

  <div id="messages"></div>

  <textarea id="msg"></textarea>
  <button id="send">Send</button>
</section>

</div>

<footer>Firebase FIX</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user = null;
let chatId = null;
let ref = null;

const login = document.getElementById("login");
const register = document.getElementById("register");
const chat = document.getElementById("chat");

const chatSelect = document.getElementById("chatSelect");
const usersOpt = document.getElementById("users");
const groupsOpt = document.getElementById("groups");
const messages = document.getElementById("messages");

function show(x){
  login.classList.remove("active");
  register.classList.remove("active");
  chat.classList.remove("active");
  x.classList.add("active");
}

auth.onAuthStateChanged(async u=>{
  if(!u){
    user = null;
    show(login);
    return;
  }

  user = u;
  show(chat);

  document.getElementById("name").value = u.email.split("@")[0];

  await loadUsers();
  joinGroup();
});

function joinGroup(){
  db.ref("groups/all/members/"+user.uid).set(true);
}

async function loadUsers(){
  usersOpt.innerHTML = "";
  groupsOpt.innerHTML = "";

  const snap = await db.ref("users").once("value");
  const data = snap.val() || {};

  let firstChat = null;

  for(let id in data){
    if(id === user.uid) continue;

    const cid = [id, user.uid].sort().join("_");

    const opt = document.createElement("option");
    opt.value = cid;
    opt.textContent = data[id].displayName || data[id].email;

    usersOpt.appendChild(opt);

    if(!firstChat) firstChat = cid;
  }

  const g = document.createElement("option");
  g.value = "all";
  g.textContent = "Everyone Chat";
  groupsOpt.appendChild(g);

  if(!firstChat) firstChat = "all";

  setTimeout(()=>{
    chatSelect.value = firstChat;
    chatSelect.dispatchEvent(new Event("change"));
  }, 300);
}

function listen(id){
  if(ref) ref.off();

  chatId = id;
  messages.innerHTML = "";

  ref = db.ref("messages/"+id);

  ref.on("child_added", s=>{
    const m = s.val();

    const div = document.createElement("div");
    div.className = "msg" + (m.sender === user.uid ? " me" : "");
    div.textContent = `${m.name}: ${m.text}`;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  });
}

chatSelect.onchange = e=>{
  if(!e.target.value) return;
  listen(e.target.value);
};

document.getElementById("send").onclick = ()=>{
  const text = document.getElementById("msg").value.trim();
  if(!text || !chatId) return;

  db.ref("messages/"+chatId).push({
    text,
    sender: user.uid,
    name: document.getElementById("name").value,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
};

// AUTH
document.getElementById("loginBtn").onclick = ()=>{
  auth.signInWithEmailAndPassword(
    document.getElementById("email").value,
    document.getElementById("pass").value
  );
};

document.getElementById("regBtn").onclick = ()=>{
  auth.createUserWithEmailAndPassword(
    document.getElementById("remail").value,
    document.getElementById("rpass").value
  ).then(c=>{
    db.ref("users/"+c.user.uid).set({
      email:c.user.email,
      displayName:c.user.email.split("@")[0]
    });
  });
};

document.getElementById("goReg").onclick=()=>show(register);
document.getElementById("goLogin").onclick=()=>show(login);

document.getElementById("logoutBtn").onclick=()=>auth.signOut();
</script>

</body>
</html>
