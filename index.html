<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messenger Pro</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  margin:0;
  font-family:system-ui;
  background:#0b141a;
  color:white;
}

#app {
  height:100vh;
  display:flex;
  flex-direction:column;
  max-width:520px;
  margin:auto;
  background:#111b21;
  overflow:hidden;
}

header {
  padding:14px;
  background:#202c33;
  font-weight:600;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

section {
  display:none;
  flex:1;
  flex-direction:column;
  overflow:hidden;
}

section.active { display:flex; }

input, textarea {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  background:#1f2c33;
  color:white;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  background:#00a884;
  color:white;
  font-weight:600;
}
.authBtn {
  padding:14px 18px;
  margin-top:8px;
}

#chatList { flex:1; overflow-y:auto; }

.chatItem {
  padding:12px;
  border-bottom:1px solid #1f2c33;
  cursor:pointer;
}

.chatItem small { opacity:0.6; }

#chatBox {
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:10px;
}

.msg {
  max-width:75%;
  padding:10px;
  border-radius:12px;
  word-break:break-word;
}

.me { background:#005c4b; align-self:flex-end; }
.other { background:#202c33; align-self:flex-start; }

small {
  display:block;
  font-size:11px;
  opacity:0.7;
  margin-top:4px;
}

.ticks {
  font-size:10px;
  opacity:0.8;
}

#inputArea {
  display:flex;
  gap:8px;
  padding:10px;
}

#msg { flex:1; }

.menu {
  position:absolute;
  right:10px;
  top:50px;
  background:#1f2c33;
  border-radius:10px;
  padding:10px;
  display:none;
}

.menu.show { display:flex; flex-direction:column; gap:8px; }

</style>
</head>

<body>

<div id="app">

<header>
  💬 Messenger Pro
  <button id="menuBtn">☰</button>
</header>

<div id="menu" class="menu">
  <div id="profileName">User</div>
  <button id="logoutBtn">Logout</button>
</div>

<section id="login" class="active">
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">

  <button id="loginBtn" class="authBtn">Login</button>
<button id="regBtn" class="authBtn">Register</button>
</section>

<section id="inbox">
  <div id="chatList"></div>
</section>

<section id="chat">

  <div style="padding:10px;background:#202c33;">
    <button id="backBtn">← Back</button>
  </div>

  <div id="chatBox"></div>

  <div id="inputArea">
    <textarea id="msg"></textarea>
    <button id="send">Send</button>
  </div>

</section>

</div>

<script>
const email = document.getElementById("email");
const pass = document.getElementById("pass");

const menuBtn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
const logoutBtn = document.getElementById("logoutBtn");

const chatBox = document.getElementById("chatBox");
const backBtn = document.getElementById("backBtn");

firebase.initializeApp({
  apiKey:"AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain:"project-955237504610034331.firebaseapp.com",
  databaseURL:"https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId:"project-955237504610034331"
});

const auth = firebase.auth();
const db = firebase.database();

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
.catch(console.error);

let user=null;
let currentRoom=null;
let msgRef=null;
let usersRef=null;

function getName(u){
  return u?.displayName || u?.email?.split("@")[0] || "user";
}

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* FIXED LISTENER */
function listenMessages(room){

  if(msgRef) msgRef.off();

  const box=document.getElementById("chatBox");
  box.innerHTML="";

  msgRef=db.ref("messages/"+room).orderByChild("time");

  msgRef.on("child_added", snap=>{
    const m=snap.val();
    const key=snap.key;

    const div=document.createElement("div");
    div.className="msg "+(m.sender===user.uid?"me":"other");
    div.setAttribute("data-key", key);

    const time=new Date(m.time||Date.now()).toLocaleTimeString();
    const seen=m.seenBy && Object.keys(m.seenBy||{}).length>1;

    div.innerHTML=`
      ${escapeHtml(m.text)}
      <small>${escapeHtml(m.name||"user")} • ${time}</small>
      <div class="ticks">${m.sender===user.uid?(seen?"✓✓":"✓"):""}</div>
    `;

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });

  msgRef.on("child_changed", snap=>{
    const m=snap.val();
    const key=snap.key;

    const div=document.querySelector(`[data-key="${key}"]`);
    if(!div) return;

    const time=new Date(m.time||Date.now()).toLocaleTimeString();
    const seen=m.seenBy && Object.keys(m.seenBy||{}).length>1;

    div.innerHTML=`
      ${escapeHtml(m.text)}
      <small>${escapeHtml(m.name||"user")} • ${time}</small>
      <div class="ticks">${m.sender===user.uid?(seen?"✓✓":"✓"):""}</div>
    `;
  });
}

/* MARK SEEN */
function markSeen(room){
  db.ref("messages/"+room).once("value", snap=>{
    snap.forEach(child=>{
      const m=child.val();
      if(m.sender!==user.uid){
        db.ref(`messages/${room}/${child.key}/seenBy/${user.uid}`).set(true);
      }
    });
  });
}

function openChat(otherUid){
  currentRoom=[user.uid,otherUid].sort().join("_");
  show("chat");
  listenMessages(currentRoom);
  markSeen(currentRoom);
}

function escapeHtml(t){
  return (t||"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

/* SEND */
document.getElementById("send").onclick=()=>{
  const text=document.getElementById("msg").value.trim();
  if(!text||!user||!currentRoom)return;

  db.ref("messages/"+currentRoom).push({
    text,
    sender:user.uid,
    name:getName(user),
    time:Date.now(),
    seenBy:{[user.uid]:true}
  });

  document.getElementById("msg").value="";
};

/* 🔥 SPEED FIXED AUTH */
auth.onAuthStateChanged(u=>{

  if(!u){
    user=null;

    if(usersRef){
      usersRef.off();
      usersRef=null;
    }

    show("login");
    return;
  }

  user=u;

  show("inbox");

  document.getElementById("profileName").textContent=getName(u);

  db.ref("users/"+u.uid).update({
    name:getName(u),
    email:u.email
  });

  if(usersRef){
    usersRef.off();
  }

  usersRef=db.ref("users");

  usersRef.once("value", snap=>{

    const list=document.getElementById("chatList");
    list.innerHTML="";

    snap.forEach(s=>{

      if(s.key===user.uid) return;

      const u=s.val();

      const div=document.createElement("div");
      div.className="chatItem";

      div.innerHTML=
        `<b>${u.name||"user"}</b><br><small>${u.email||""}</small>`;

      div.onclick=()=>openChat(s.key);

      list.appendChild(div);
    });

  });

});

/* LOGIN */
document.getElementById("loginBtn").onclick=()=>{
  auth.signInWithEmailAndPassword(email.value, pass.value);
};

/* REGISTER */
document.getElementById("regBtn").onclick=async()=>{

  const btn=document.getElementById("regBtn");

  if(btn.disabled) return;

  btn.disabled=true;
  btn.textContent="Registering...";

  try{

    const emailVal=email.value.trim();
    const passVal=pass.value;

    const res=await auth.createUserWithEmailAndPassword(
      emailVal,
      passVal
    );

    await res.user.updateProfile({
      displayName: emailVal.split("@")[0]
    });

  }catch(err){

    alert(err.message);

    btn.disabled=false;
    btn.textContent="Register";
  }

};

/* MENU */
menuBtn.onclick=()=>menu.classList.toggle("show");
document.addEventListener("click",e=>{
  if(!menu.contains(e.target)&&e.target!==menuBtn){
    menu.classList.remove("show");
  }
});

/* LOGOUT */
logoutBtn.onclick=()=>auth.signOut();

/* BACK */
backBtn.onclick=()=>{
  currentRoom=null;
  if(msgRef)msgRef.off();
  msgRef=null;
  if (chatBox) chatBox.innerHTML = "";
  show("inbox");
};
</script>

</body>
</html>
