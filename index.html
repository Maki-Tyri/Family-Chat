<script>
const firebaseConfig = {
  apiKey: "AIzaSyCy9CKJ6CELheBhw7Gs0BgsE1E0FsoYdgU",
  authDomain: "project-955237504610034331.firebaseapp.com",
  databaseURL: "https://project-955237504610034331-default-rtdb.firebaseio.com",
  projectId: "project-955237504610034331"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let user=null;
let currentRoom=null;
let msgRef=null;

/* UI */
function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* SAFE NAME */
function getName(u){
  return u?.displayName || u?.email?.split("@")[0] || "user";
}

/* AUTH */
auth.onAuthStateChanged(async u=>{
  if(!u){
    show("login");
    return;
  }

  user=u;
  show("inbox");

  loadChats();
});

/* CHAT LIST FIXED */
function loadChats(){
  const list=document.getElementById("chatList");

  db.ref("messages").off();
  db.ref("messages").on("value", snap=>{
    list.innerHTML="";

    snap.forEach(roomSnap=>{
      const room=roomSnap.key;
      const msgs=roomSnap.val();

      if(!msgs) return;

      const keys=Object.keys(msgs);
      const lastKey=keys[keys.length-1];
      const last=msgs[lastKey];

      const div=document.createElement("div");
      div.className="chatItem";

      div.innerHTML=`
        <b>${room}</b><br>
        ${last?.text || ""}<br>
        <small>${last?.name || ""}</small>
      `;

      div.onclick=()=>openChat(room);
      list.appendChild(div);
    });
  });
}

/* OPEN CHAT */
function openChat(room){
  currentRoom=room;
  show("chat");

  listenMessages(room);
  markSeen(room);
}

/* CHAT LISTENER FIXED */
function listenMessages(room){

  if(msgRef) msgRef.off();

  const box=document.getElementById("chatBox");
  box.innerHTML="";

  msgRef=db.ref("messages/"+room);

  msgRef.on("child_added", snap=>{
    const m=snap.val();
    const key=snap.key;

    const div=document.createElement("div");
    div.className="msg "+(m.sender===user.uid?"me":"other");

    const time=new Date(m.time||Date.now()).toLocaleTimeString();

    const seen = m.seenBy && Object.keys(m.seenBy).length>1;

    div.innerHTML=`
      ${escapeHtml(m.text)}
      <small>${escapeHtml(m.name)} • ${time}</small>
      <div class="ticks">${m.sender===user.uid ? (seen?"✓✓":"✓") : ""}</div>
    `;

    /* LONG PRESS DELETE FIXED */
    if(m.sender===user.uid){
      let hold;

      const start=()=>{
        hold=setTimeout(()=>{
          if(confirm("Delete message?")){
            db.ref(`messages/${room}/${key}`).remove();
          }
        },700);
      };

      const cancel=()=>clearTimeout(hold);

      div.addEventListener("mousedown",start);
      div.addEventListener("mouseup",cancel);
      div.addEventListener("mouseleave",cancel);
      div.addEventListener("touchstart",start);
      div.addEventListener("touchend",cancel);
    }

    box.appendChild(div);
    box.scrollTop=box.scrollHeight;
  });
}

/* SEEN FIXED (auto update only unread) */
function markSeen(room){
  db.ref("messages/"+room).once("value", snap=>{
    snap.forEach(child=>{
      const m=child.val();
      if(m.sender!==user.uid){
        db.ref(`messages/${room}/${child.key}/seenBy/${user.uid}`).set(true);
      }
    });
  });
}

/* SEND FIXED */
document.getElementById("send").onclick=()=>{
  const text=document.getElementById("msg").value.trim();
  if(!text||!user||!currentRoom) return;

  db.ref("messages/"+currentRoom).push({
    text,
    sender:user.uid,
    name:getName(user),
    time:Date.now(),
    seenBy:{[user.uid]:true}
  });

  document.getElementById("msg").value="";
};

/* LOGIN FIX */
document.getElementById("loginBtn").onclick=()=>{
  const email=document.getElementById("email").value;
  const pass=document.getElementById("pass").value;

  auth.signInWithEmailAndPassword(email,pass);
};

/* REGISTER FIX */
document.getElementById("regBtn").onclick=()=>{
  const email=document.getElementById("email").value;
  const pass=document.getElementById("pass").value;

  const defaultName=email.split("@")[0];

  auth.createUserWithEmailAndPassword(email,pass)
  .then(u=>{
    u.user.updateProfile({displayName:defaultName});
  });
};

function escapeHtml(t){
  return (t||"")
  .replaceAll("&","&amp;")
  .replaceAll("<","&lt;")
  .replaceAll(">","&gt;");
}
</script>
